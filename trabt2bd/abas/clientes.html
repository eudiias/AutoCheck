<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - AutoCheck</title>
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/clientes.css">
    <script src="https://kit.fontawesome.com/847d97f27f.js" crossorigin="anonymous"></script>
</head>
<body>

    <header class="top-navbar">
        <div class="navbar-logo">
            <img src="../imagens/Logo.png" alt="Logo">
        </div>

        <nav class="navbar-nav">
            <ul class="nav-links" id="nav-links">
                <li>
                    <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
                </li>
                <li>
                    <a href="#" class="active"><i class="fa-solid fa-users"></i>Clientes</a>
                </li>
                <li>
                    <a href="veiculos.html"><i class="fa-solid fa-car"></i>Veiculos</a>
                </li>
                <li>
                    <a href="funcionarios.html"><i class="fa-regular fa-address-card"></i>Funcionarios</a>
                </li>
                <li>
                    <a href="triagem.html"><i class="fa-solid fa-clipboard-list"></i>Triagem</a>
                </li>
                <li>
                    <a href="ordemdeservico.html"><i class="fa-solid fa-headset"></i>Ordens de serviço</a>
                </li>
                <li>
                    <a href="#" class="leave"><i class="fa-solid fa-right-from-bracket"></i>Sair</a>
                </li>
            </ul>
        </nav>
        
        <button class="menu-toggle" id="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <main class="main-content">
        <div class="page-wrapper">
            <header class="main-header">
                <h1 class="title">Gerenciador de Clientes</h1>
                <h2 class="sub-title">Cadastro e gerenciamento de clientes</h2>
            </header>
            
            <section class="card-container">
                <h2 class="card-title"><i class="fa-solid fa-magnifying-glass"></i>Buscar Clientes</h2>
                <form class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input 
                        type="search" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="Buscar por nome ou CPF">
                    <button type="submit" class="search-button">Pesquisar</button>
                </form>
            </section>

            <section class="card-container">
                <h2 class="card-title"><i class="fa-solid fa-user-plus"></i>Cadastrar Novo Cliente</h2>
                <form class="container-client-form">
                    
                    <div class="register-container">
                        <div class="input-container">
                            <label for="nome">Nome</label>
                            <input type="text" name="nome" id="nome" placeholder="Digite seu nome e sobrenome">
                        </div>
                        <div class="input-container">
                            <label for="cpf">CPF</label>
                            <input type="number" name="cpf" id="cpf" placeholder="Digite seu CPF">
                        </div>
                        <div class="input-container">
                            <label for="tel">Telefone</label>
                            <input type="number" name="tel" id="tel" placeholder="Digite seu telefone">
                        </div>
                        <div class="input-container">
                            <label for="password">Senha</label>
                            <input type="password" name="password" id="password" placeholder="Min. 6 caracteres">
                        </div>
                    </div>
                    
                    <button class="orders-button button" type="submit">
                        <i class="fa-solid fa-floppy-disk"></i>Cadastrar cliente
                    </button>
                </form>
            </section>

            <section class="card-container">
                <h2 class="card-title"><i class="fa-solid fa-list"></i>Clientes Cadastrados</h2>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>CPF</th>
                                <th>Telefone</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                </div>
                
                <div class="prox-ant-container">
                    <button class="button"><i class="fa-solid fa-arrow-left"></i>Anterior</button>
                    <button class="button">Proxima<i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </section>

            <footer class="main-footer">
                <p>© 2025 LTDA AutoCheck</p>
            </footer>

        </div> 
    </main>

    <script>
        async function fetchClientes() {
            try {
                const response = await fetch('https://fatecbackend.vercel.app/api/clientes/listar');
                const data = await response.json();

            for (const cliente of data) {
                const trCliente = document.createElement('tr');
                trCliente.classList.add('table-line');
                trCliente.innerHTML = `
                    <td class.table-cellula">${cliente.nome_cliente}</td>
                    <td class="table-cellula">${cliente.cpf_cliente}</td>
                    <td class="table-cellula">${cliente.telefone_cliente}</td>
                    <td class="table-cellula table-cellula-buttons">
                        <button class="button button-edit">Editar</button>
                        <button class="button button-delete">Excluir</button>
                    </td>
                `;
                document.querySelector('tbody').appendChild(trCliente);
            }
            } catch (error) {
                console.error('Erro ao buscar clientes:', error);
            }
        }
        fetchClientes();

        // Script para o menu mobile (se for usar a lógica do hamburger)
        // const menuToggle = document.getElementById('menu-toggle');
        // const navLinks = document.getElementById('nav-links');
        // menuToggle.addEventListener('click', () => {
        //     navLinks.classList.toggle('open');
        // });
    </script>
</body>
</html>
