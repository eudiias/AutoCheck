<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AutoCheck</title>
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://kit.fontawesome.com/847d97f27f.js" crossorigin="anonymous"></script>
</head>
<body>
    <header class="top-navbar">
        <div class="navbar-logo">
            <img src="../imagens/Logo.png" alt="Logo">
        </div>

        <nav class="navbar-nav">
            <ul class="nav-links" id="nav-links">
                <li>
                    <a href="dashboard.html" class="active"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
                </li>
                <li>
                    <a href="clientes.html" ><i class="fa-solid fa-users"></i>Clientes</a>
                </li>
                <li>
                    <a href="veiculos.html"><i class="fa-solid fa-car"></i>Veiculos</a>
                </li>
                <li>
                    <a href="funcionarios.html"><i class="fa-regular fa-address-card"></i>Funcionarios</a>
                </li>
                <li>
                    <a href="triagem.html"><i class="fa-solid fa-clipboard-list"></i>Triagem</a>
                </li>
                <li>
                    <a href="ordemdeservico.html"><i class="fa-solid fa-headset"></i>Ordens de serviço</a>
                </li>
                <li>
                    <a href="../index.html" class="leave"><i class="fa-solid fa-right-from-bracket"></i>Sair</a>
                </li>
            </ul>
        </nav>
        
        <button class="menu-toggle" id="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <main class="main-content">
        <div class="page-wrapper">

            <h1 class="title">Dashboard</h1>
            <h2 class="sub-title">Visão geral do sistema</h2>
            
            <section class="dashboard-info">
                <article class="info-item">
                    <h2 class="dashboard-title"><i class="fa-solid fa-users"></i>Clientes</h2>
                    <p id="client-count">0</p>
                    <p class="info-p">Clientes cadastrados</p>
                </article>

                <article class="info-item">
                    <h2 class="dashboard-title"><i class="fa-solid fa-car"></i>Veículos</h2>
                    <p id="vehicle-count">0</p>
                    <p class="info-p">Veículos cadastrados</p>
                </article>

                <article class="info-item">
                    <h2 class="dashboard-title"><i class="fa-solid fa-clock"></i>Pendentes</h2>
                    <p id="pending-count">0</p>
                    <p class="info-p">Serviços Pendentes</p>
                </article>

                <article class="info-item">
                    <h2 class="dashboard-title"><i class="fa-solid fa-circle-check"></i>Concluidos</h2>
                    <p id="completed-count">0</p>
                    <p class="info-p">Serviços Concluídos</p>
                </article>
            </section>

            <section class="container">
                <section class="container-shortcuts">
                    <h2 class="dashboard-title"><i class="fa-solid fa-bolt"></i>Atalhos</h2>
                    <article class="container-buttons">
                        <button class="orders-button button" onclick="iniciarModal('modalClientes')"><i class="fa-solid fa-user-plus"></i>Novo Cliente</button>
                        <button class="button"><i class="fa-solid fa-car-on"></i>Novo carro</button>
                        <button class="button"><i class="fa-solid fa-plus"></i>Nova triagem</button>
                    </article>
                </section>
            </section>
        
        </div>
    </main>

    <!--Criação do Modal-->
    <div id="modalClientes" class="modal">
        <div class="cont-modal">
            <h1>Novo Cliente</h1>

            <form>
                <label>Nome:</label>
                <input type="text" id="nomeCliente"><br>
                <label>CPF:</label>
                <input type="text" id="cpfCliente" pattern="\d(3)\.\d(3)\.\d(3)-\d(2)" placeholder="000.000.000-00"><br>
                <label>Telefone:</label>
                <input type="text" id="telCliente" pattern="\(\d{2}\)\s\d{4,5}-\d{4}" placeholder="(00) 0 0000-0000">

                <div class="botoesModal">
                    <button onclick="">Confirmar</button>
                    <button onclick="">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
    <!--Fim Modal Clientes-->
    
    <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
