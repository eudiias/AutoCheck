                <h1 class="title">Gerenciador de Funcionários</h1>
                <h2 class="sub-title">Cadastro e gerenciamento de funcionários</h2>
            </header>
            
            <section class="card-container">
                <h2 class="card-title"><i class="fa-solid fa-magnifying-glass"></i>Buscar Funcionários</h2>
                <form class="search-container" method="post" id="searchForm">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input 
                        type="search" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="Buscar por nome">
                    <button type="submit" class="search-button">Pesquisar</button>
                </form>
            </section>

            <section class="card-container">
                <h2 class="card-title"><i class="fa-solid fa-user-plus"></i>Cadastrar Novo Funcionário</h2>
                <form id="register-form">

                    <div class="register-container">
                        <div class="input-container">
                            <label for="nome_funcionario">Nome do Funcionário</label>
                            <input type="text" name="nome_funcionario" id="nome_funcionario" placeholder="Digite o nome completo">
                        </div>
                        <div class="input-container">
                            <label for="tel_funcionario">Telefone</label>
                            <input type="text" name="tel_funcionario" id="tel_funcionario" placeholder="Ex: (11) 98765-4321">
                        </div>
                        <div class="input-container">
                            <label for="id_funcao">ID da Função</label>
                            <input type="number" name="id_funcao" id="id_funcao" placeholder="Digite o ID da função">
                        </div>
                    </div> 
                    
                    <button class="orders-button button" type="submit">
                        <i class="fa-solid fa-floppy-disk"></i>Cadastrar Funcionário
                    </button>
                </form>
            </section>

            <section class="card-container" id="funcContainer">
                <h2 class="card-title"><i class="fa-solid fa-list"></i>Funcionários Cadastrados</h2>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Telefone</th>
                                <th>Função</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaFunc">

                    </table>

                    <button class="button"><i class="fa-solid fa-arrow-left"></i>Anterior</button>
