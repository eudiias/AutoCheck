    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/clientes.css">
    <script src="https://kit.fontawesome.com/847d97f27f.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <nav class="sidebar">  
            <div class="sidebar-logo">
                <img src="../imagens/Logo.png" alt="Logo">
            </div>

            <ul class="nav-links">
                <li>
                    <a href="dashboard.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
                </li>
                <li>
                    <a href="clientes.html"><i class="fa-solid fa-users"></i>Clientes</a>
                </li>
                <li>
                    <a href="veiculos.html"><i class="fa-solid fa-car"></i>Veiculos</a>
                </li>
                <li>
                    <a href="#" class="active"><i class="fa-regular fa-address-card"></i>Funcionarios</a>
                </li>
                <li>
                    <a href="triagem.html"><i class="fa-solid fa-clipboard-list"></i>Triagem</a>

                    <a href="ordemdeservico.html"><i class="fa-solid fa-headset"></i>Ordens de serviço</a>

        </nav>

    <main class="main-content">
        <h1 class="title">Gerenciador de Funcionários</h1>
        <h2 class="sub-title">Cadastro e gerenciamento de funcionários</h2>
        
        <section class="style-search-container">
            <h2 class="dashboard-title"><i class="fa-solid fa-magnifying-glass"></i>Buscar Funcionários</h2>
            <form action="#" class="search-container" method="post" id="searchForm">
                
                <input 
                    type="search" 
                    id="search-input" 
                    class="search-input" 
                    placeholder="Buscar por nome"> <button type="submit"     class="search-button">Pesquisar</button>
            </form>
        </section>

        <section class="style-search-container">
            <form id="register-form" method="post" class="container-client-form">

                <div class="register-container">
                    
                    <div class="input-container">
                        <label for="nome_funcionario">Nome do Funcionário</label>
                        <input type="text" name="nome_funcionario" id="nome_funcionario" placeholder="Digite o nome completo">
                    </div>
                    
                    <div class="input-container">
                        <label for="tel_funcionario">Telefone</label>
                        <input type="text" name="tel_funcionario" id="tel_funcionario" placeholder="Ex: (11) 98765-4321">
                    </div>

                    <div class="input-container">
                        <label for="id_funcao">ID da Função</label>
                        <input type="number" name="id_funcao" id="id_funcao" placeholder="Digite o ID da função">
                    </div>
                    
                </div> 
                <button class="orders-button button" type="submit"><i class="fa-solid fa-floppy-disk"></i>Cadastrar Funcionário</button>

            </form>
        </section>

        <section class="style-search-container" id="funcContainer">
            <h2 class="dashboard-title"><i class="fa-solid fa-list"></i>Funcionários Cadastrados</h2>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Função</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaFuncs">
                    <!-- Dados dos funcionários serão inseridos aqui dinamicamente -->
                </tbody>
            </table>
            
            <div class="prox-ant-container">
                <button class="button"><i class="fa-solid fa-arrow-left"></i>Anterior</button>
                <button class="button">Proxima  <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </section>
    </main>

   <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    async function atualizarLista(){
        try {
            const response = await fetch('https://fatecbackend.vercel.app/api/funcionarios/listar');
            const data = await response.json();
            document.getElementById('tabelaFuncs').innerHTML = '';
            for (const funcionario of data) {
                const trFuncionario = document.createElement('tr');
                trFuncionario.classList.add('table-line');
                trFuncionario.id = funcionario.id_funcionario
                trFuncionario.innerHTML = `
                <td class="table-cellula">${funcionario.nome_funcionario}</td>
                <td class="table-cellula">${funcionario.telefone_funcionario}</td>
                    <td class="table-cellula">${funcionario.funcao}</td>
                    <td class="table-cellula table-cellula-buttons">
                        <button class="button">Editar</button>
                        <button class="button" onclick="removerFuncionario(${funcionario.id_funcionario})">Excluir</button>
                    </td>
                `;
                document.getElementById('tabelaFuncs').appendChild(trFuncionario);
            }
        } catch (error) {
            console.error('Erro ao buscar funcionários:', error);
        }
    }
    async function removerFuncionario(id){
        try {
            const url = `https://fatecbackend.vercel.app/api/funcionarios/remover/${id}`;
            const response = await fetch(url, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                const text = await response.text();
                console.error('Erro ao remover funcionário:', response.status, text);
                alert('Falha ao remover funcionário. Verifique o console para mais detalhes.');
                return;
            }

            // atualizar a lista após remoção bem-sucedida
            atualizarLista();
        } catch (error) {
            console.error('Erro ao remover funcionário:', error);
            alert('Erro ao remover funcionário. Verifique o console para mais detalhes.');
        }
    }
    async function adicionarUsuario(user) {
        try {
            const url = 'https://fatecbackend.vercel.app/api/funcionarios/adicionar';
            
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(user)
            });

            if (!response.ok) {
                const text = await response.text();
                console.error('Erro ao adicionar funcionário:', response.status, text);
                alert('Falha ao adicionar funcionário.');
                return;
            }

            alert('Funcionário adicionado com sucesso!');
            atualizarLista();
        } catch (error) {
            console.error('Erro ao adicionar funcionário:', error);
            alert('Erro ao adicionar funcionário.');
        }
    }
    document.getElementById("register-form").addEventListener("submit",event => {
        event.preventDefault()
        const user = {
            nome_funcionario: document.getElementById('nome_funcionario').value,
            telefone_funcionario: document.getElementById('tel_funcionario').value,
            id_funcoes: document.getElementById('id_funcao').value
        };
        console.log(user)
        adicionarUsuario(user);
    })
    atualizarLista();
</script>
<script type="module" src="../js/mock.js"></script>
</body>
</html>
